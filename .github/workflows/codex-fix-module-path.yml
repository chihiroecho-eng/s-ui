name: Codex Fix Module Path

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/codex-fix-module-path.yml

permissions:
  contents: write

jobs:
  fix-module-path:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Normalize fork module paths
        run: |
          set -e
          find . -type f -name '*.go' -print0 | xargs -0 sed -i 's#github.com/admin8800/s-ui#github.com/chihiroecho-eng/s-ui#g'
          sed -i '/module github.com/admin8800\/s-ui/d' go.mod || true
          sed -i '/s#module github.com\/chihiroecho-eng\/s-ui#module github.com\/admin8800\/s-ui#/d' .github/workflows/release.yml Dockerfile build.sh || true
          sed -i '/s#github.com\/chihiroecho-eng\/s-ui#github.com\/admin8800\/s-ui#g/d' .github/workflows/release.yml Dockerfile build.sh || true
          sed -i 's#ghcr.io/admin8800/s-ui#ghcr.io/chihiroecho-eng/s-ui#g' docker-compose.yml README.md || true
          rm -f .github/workflows/codex-fix-module-path.yml

      - name: Commit cleanup
        run: |
          set -e
          git config user.name "Codex"
          git config user.email "codex@openai.com"
          if git diff --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git add .
          git commit -m "fix: align module path with fork"
          git push
