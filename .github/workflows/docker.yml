name: Docker 镜像 CI

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "发布标签"
        required: true
        default: "v1.4.1"
        type: string

jobs:
  frontend-build:
    runs-on: ubuntu-24.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}
          submodules: recursive

      - name: 设置 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 25

      - name: 安装依赖并构建前端
        run: |
          cd frontend
          npm install
          npm run build

      - name: 上传前端构建产物
        uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend/dist/

  build:
    needs: frontend-build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { platform: linux/amd64 }
          - { platform: linux/386 }
          - { platform: linux/arm64/v8 }
          - { platform: linux/arm/v7 }
          - { platform: linux/arm/v6 }
    runs-on: ubuntu-24.04
    steps:
      - name: 检出仓库
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ inputs.tag }}

      - name: 下载前端构建产物
        uses: actions/download-artifact@v8
        with:
          name: frontend-dist
          path: frontend_dist

      - name: 准备
        run: |
          platform="${{ matrix.platform }}"
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: Docker 元数据
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            alireza7/s-ui
            ghcr.io/alireza0/s-ui
          tags: |
            type=raw,value=${{ inputs.tag }}

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v4

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 缓存 Docker 层
        uses: actions/cache@v5
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.platform }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.platform }}-

      - name: 登录 Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 登录 GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 按摘要构建并推送
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend-artifact
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            alireza7/s-ui
            ghcr.io/alireza0/s-ui
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache,mode=max
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true

      - name: 导出摘要
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          echo "${digest#sha256:}" > "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: 上传摘要
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - name: 下载摘要
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: 登录 Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: 登录 GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker 元数据
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            alireza7/s-ui
            ghcr.io/alireza0/s-ui
          tags: |
            type=raw,value=${{ inputs.tag }}

      - name: 创建清单列表并推送
        env:
          DOCKER_METADATA_OUTPUT_JSON: ${{ steps.meta.outputs.json }}
        working-directory: ${{ runner.temp }}/digests
        run: |
          set -e
          for img in alireza7/s-ui ghcr.io/alireza0/s-ui; do
            TAGS_ARGS=$(echo "$DOCKER_METADATA_OUTPUT_JSON" | jq -cr --arg img "$img" '.tags | map(select(startswith($img))) | map("-t " + .) | join(" ")')
            DIGEST_REFS=$(for f in *; do echo -n "${img}@sha256:$(cat "$f") "; done)
            docker buildx imagetools create $TAGS_ARGS $DIGEST_REFS
          done
